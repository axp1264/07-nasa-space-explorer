<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>NASA Space Explorer</title>
        <link href="style.css" rel="stylesheet" type="text/css" />
        </head>
        <body>
          <div class="container">
              <header class="site-header">
                    <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
                          <h1>Space Explorer</h1>
                              </header>
                              
                                  <div id="spaceFact" class="space-fact">
                                        <p>Did You Know? Space facts will appear here.</p>
                                            </div>
                                            
                                                <div class="filters">
                                                      <input type="date" id="startDate" />
                                                            <input type="date" id="endDate" />
                                                                  <button id="fetchBtn">Get Space Images</button>
                                                                      </div>
                                                                      
                                                                          <div id="gallery" class="gallery">
                                                                                <div class="placeholder">
                                                                                        <div class="placeholder-icon">🔭</div>
                                                                                                <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
                                                                                                      </div>
                                                                                                          </div>
                                                                                                            </div>
                                                                                                            
                                                                                                              <div id="modal" class="modal hidden">
                                                                                                                  <div class="modal-content">
                                                                                                                        <span id="closeModal" class="close-btn">&times;</span>
                                                                                                                              <img id="modalImg" />
                                                                                                                                    <iframe id="modalVideo" class="hidden"></iframe>
<a id="modalVideoLink" class="video-link-btn hidden" target="_blank" rel="noopener noreferrer">▶ Watch Video on NASA / Source</a>
                                                                                                                                          <h2 id="modalTitle"></h2>
                                                                                                                                                <p id="modalDate"></p>
                                                                                                                                                      <p id="modalExplanation"></p>
                                                                                                                                                          </div>
                                                                                                                                                            </div>
                                                                                                                                                            
                                                                                                                                                              <script src="js/dateRange.js"></script>
                                                                                                                                                                <script src="js/script.js"></script>
                                                                                                                                                                </body>
                                                                                                                                                                </html>>
